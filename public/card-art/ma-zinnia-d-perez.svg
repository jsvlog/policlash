<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#117864"/>
      <stop offset="100%" style="stop-color:#17a589"/>
    </linearGradient>
    <linearGradient id="face2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0ac69"/>
      <stop offset="100%" style="stop-color:#e0ac69dd"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" fill="url(#bg2)" rx="16"/>
  
  <!-- Decorative pattern -->
  <g opacity="0.08">
    <circle cx="137" cy="378" r="32" fill="white"/><circle cx="195" cy="180" r="27" fill="white"/><circle cx="185" cy="33" r="16" fill="white"/><circle cx="51" cy="475" r="17" fill="white"/><circle cx="218" cy="203" r="40" fill="white"/><circle cx="25" cy="396" r="21" fill="white"/><circle cx="367" cy="144" r="30" fill="white"/><circle cx="338" cy="83" r="15" fill="white"/><circle cx="340" cy="523" r="25" fill="white"/><circle cx="332" cy="450" r="32" fill="white"/><circle cx="123" cy="393" r="39" fill="white"/><circle cx="359" cy="142" r="32" fill="white"/>
  </g>
  
  <!-- Card border accent -->
  <rect x="12" y="12" width="376" height="536" rx="12" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Name plate area -->
  <rect x="20" y="440" width="360" height="100" rx="10" fill="black" opacity="0.4"/>
  <rect x="20" y="440" width="360" height="3" fill="#17a589" opacity="0.6"/>
  
  <!-- Rarity badge -->
  <rect x="300" y="28" width="80" height="28" rx="14" fill="white" opacity="0.12"/>
  <text x="340" y="47" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold" opacity="0.7">COMMON</text>
  
  <!-- Faction badge -->
  <rect x="20" y="28" width="60" height="28" rx="14" fill="white" opacity="0.1"/>
  <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="14">🎩</text>
  
  <!-- Character body (simplified) -->
  <g filter="url(#shadow2)">
    <!-- Shoulders -->
    <ellipse cx="200" cy="400" rx="90" ry="30" fill="#2c1810" opacity="0.15"/>
    
    <!-- Neck -->
    <rect x="185" y="290" width="30" height="40" rx="10" fill="#e0ac69dd"/>
    
    <!-- Head/face -->
    <ellipse cx="200" cy="260" rx="57" ry="71" fill="url(#face2)"/>
    
    <!-- Hair -->
    <ellipse cx="200" cy="220" rx="61" ry="61" fill="#2c1810"/>
    <ellipse cx="200" cy="230" rx="65" ry="20" fill="#2c1810" opacity="0.9"/>
    
    <!-- Side hair -->
    <rect x="110" y="240" width="12" height="40" rx="6" fill="#2c1810" opacity="0.7"/>
    <rect x="278" y="240" width="12" height="40" rx="6" fill="#2c1810" opacity="0.7"/>
    
    <!-- Eyes -->
    <ellipse cx="175" cy="258" rx="10" ry="6" fill="white"/>
    <ellipse cx="225" cy="258" rx="10" ry="6" fill="white"/>
    <ellipse cx="175" cy="258" rx="5" ry="5" fill="#4a3728"/>
    <ellipse cx="225" cy="258" rx="5" ry="5" fill="#4a3728"/>
    <ellipse cx="175" cy="256" rx="2" ry="2" fill="white"/>
    <ellipse cx="225" cy="256" rx="2" ry="2" fill="white"/>
    
    <!-- Eyebrows -->
    <path d="M 162 248 Q 175 244 188 248" stroke="#2c1810" stroke-width="2.5" fill="none"/>
    <path d="M 212 248 Q 225 244 238 248" stroke="#2c1810" stroke-width="2.5" fill="none"/>
    
    <!-- Nose -->
    <path d="M 200 258 Q 195 270 200 275 Q 205 270 200 258" fill="#e0ac69bb" stroke="#e0ac69aa" stroke-width="0.5"/>
    
    <!-- Mouth -->
    <path d="M 188 285 Q 200 292 212 285" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Glasses (some wear them) -->
    
    
    <!-- Moustache (some) -->
    <path d="M 185 282 Q 200 278 215 282" stroke="#2c1810" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Collar/shirt -->
    <path d="M 155 330 L 200 370 L 245 330" fill="#17a589" opacity="0.3" stroke="white" stroke-width="0.5" stroke-opacity="0.2"/>
  </g>
  
  <!-- Card name -->
  <text x="200" y="478" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">Ma. Zinnia D. Perez</text>
  
  <!-- Title -->
  <text x="200" y="502" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="13" opacity="0.6">Barangay Captain</text>
  
  <!-- Level/stat hint -->
  <text x="200" y="526" text-anchor="middle" fill="#17a589" font-family="Arial,Helvetica,sans-serif" font-size="11" opacity="0.5">NCR • Common • Trapo</text>
  
  <!-- Bottom corner decorations -->
  <circle cx="60" cy="520" r="20" fill="white" opacity="0.04"/>
  <circle cx="340" cy="520" r="20" fill="white" opacity="0.04"/>
</svg>