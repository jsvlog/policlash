    </linearGradient>
    <linearGradient id="face31" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c68642"/>
      <stop offset="100%" style="stop-color:#c68642dd"/>
    </linearGradient>
    <filter id="shadow31">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" fill="url(#bg31)" rx="16"/>
  
  <!-- Decorative pattern -->
