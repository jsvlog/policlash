    <ellipse cx="175" cy="258" rx="5" ry="5" fill="#1a1a1a"/>
    <ellipse cx="225" cy="258" rx="5" ry="5" fill="#1a1a1a"/>
    <ellipse cx="175" cy="256" rx="2" ry="2" fill="white"/>
    <ellipse cx="225" cy="256" rx="2" ry="2" fill="white"/>
    
