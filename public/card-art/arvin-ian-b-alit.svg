    <!-- Mouth -->
    <path d="M 188 285 Q 200 292 212 285" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Glasses (some wear them) -->
    
    
    <!-- Moustache (some) -->
    
    
    <!-- Collar/shirt -->
    <path d="M 155 330 L 200 370 L 245 330" fill="#9b59b6" opacity="0.3" stroke="white" stroke-width="0.5" stroke-opacity="0.2"/>
  </g>
  
  <!-- Card name -->
  <text x="200" y="478" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">Arvin Ian B. Alit</text>
  
