<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d3c98"/>
      <stop offset="100%" style="stop-color:#af7ac5"/>
    </linearGradient>
    <linearGradient id="face17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#c9a96edd"/>
    </linearGradient>
    <filter id="shadow17">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" fill="url(#bg17)" rx="16"/>
  
  <!-- Decorative pattern -->
  <g opacity="0.08">
    <circle cx="296" cy="193" r="29" fill="white"/><circle cx="276" cy="209" r="17" fill="white"/><circle cx="359" cy="131" r="40" fill="white"/><circle cx="75" cy="442" r="19" fill="white"/><circle cx="43" cy="479" r="35" fill="white"/><circle cx="81" cy="433" r="23" fill="white"/><circle cx="166" cy="155" r="31" fill="white"/><circle cx="286" cy="250" r="40" fill="white"/><circle cx="110" cy="120" r="28" fill="white"/><circle cx="95" cy="305" r="22" fill="white"/><circle cx="81" cy="341" r="36" fill="white"/><circle cx="222" cy="289" r="21" fill="white"/>
  </g>
  
  <!-- Card border accent -->
  <rect x="12" y="12" width="376" height="536" rx="12" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Name plate area -->
  <rect x="20" y="440" width="360" height="100" rx="10" fill="black" opacity="0.4"/>
  <rect x="20" y="440" width="360" height="3" fill="#af7ac5" opacity="0.6"/>
  
  <!-- Rarity badge -->
  <rect x="300" y="28" width="80" height="28" rx="14" fill="white" opacity="0.12"/>
  <text x="340" y="47" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold" opacity="0.7">COMMON</text>
  
  <!-- Faction badge -->
  <rect x="20" y="28" width="60" height="28" rx="14" fill="white" opacity="0.1"/>
  <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="14">🎩</text>
  
  <!-- Character body (simplified) -->
  <g filter="url(#shadow17)">
    <!-- Shoulders -->
    <ellipse cx="200" cy="400" rx="90" ry="30" fill="#2c1810" opacity="0.15"/>
    
    <!-- Neck -->
    <rect x="185" y="290" width="30" height="40" rx="10" fill="#c9a96edd"/>
    
    <!-- Head/face -->
    <ellipse cx="200" cy="260" rx="69" ry="63" fill="url(#face17)"/>
    
    <!-- Hair -->
    <ellipse cx="200" cy="220" rx="73" ry="53" fill="#2c1810"/>
    <ellipse cx="200" cy="230" rx="77" ry="20" fill="#2c1810" opacity="0.9"/>
    
    <!-- Side hair -->
    <rect x="110" y="240" width="12" height="40" rx="6" fill="#2c1810" opacity="0.7"/>
    <rect x="278" y="240" width="12" height="40" rx="6" fill="#2c1810" opacity="0.7"/>
    
    <!-- Eyes -->
    <ellipse cx="175" cy="258" rx="10" ry="6" fill="white"/>
    <ellipse cx="225" cy="258" rx="10" ry="6" fill="white"/>
    <ellipse cx="175" cy="258" rx="5" ry="5" fill="#4a3728"/>
    <ellipse cx="225" cy="258" rx="5" ry="5" fill="#4a3728"/>
    <ellipse cx="175" cy="256" rx="2" ry="2" fill="white"/>
    <ellipse cx="225" cy="256" rx="2" ry="2" fill="white"/>
    
    <!-- Eyebrows -->
    <path d="M 162 248 Q 175 244 188 248" stroke="#2c1810" stroke-width="2.5" fill="none"/>
    <path d="M 212 248 Q 225 244 238 248" stroke="#2c1810" stroke-width="2.5" fill="none"/>
    
    <!-- Nose -->
    <path d="M 200 258 Q 195 270 200 275 Q 205 270 200 258" fill="#c9a96ebb" stroke="#c9a96eaa" stroke-width="0.5"/>
    
    <!-- Mouth -->
    <path d="M 188 285 Q 200 292 212 285" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Glasses (some wear them) -->
    
    
    <!-- Moustache (some) -->
    
    
    <!-- Collar/shirt -->
    <path d="M 155 330 L 200 370 L 245 330" fill="#af7ac5" opacity="0.3" stroke="white" stroke-width="0.5" stroke-opacity="0.2"/>
  </g>
  
  <!-- Card name -->
  <text x="200" y="478" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">Jose Maria M. Rodriguez</text>
  
  <!-- Title -->
  <text x="200" y="502" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="13" opacity="0.6">Barangay Captain</text>
  
  <!-- Level/stat hint -->
  <text x="200" y="526" text-anchor="middle" fill="#af7ac5" font-family="Arial,Helvetica,sans-serif" font-size="11" opacity="0.5">NCR • Common • Trapo</text>
  
  <!-- Bottom corner decorations -->
  <circle cx="60" cy="520" r="20" fill="white" opacity="0.04"/>
  <circle cx="340" cy="520" r="20" fill="white" opacity="0.04"/>
